<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Nations — Election Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>html,body{margin:0;padding:0;background:#fff;}</style>
</head>
<body>
<div id="graphic" style="padding:12px;">
  <div class="country-tabs">
    <button class="country-tab active" data-country="england">
      <img src="img/england.webp" alt="" class="country-tab-icon" loading="lazy" decoding="async">
      <span>England</span>
    </button>
    <button class="country-tab" data-country="scotland">
      <img src="img/scotland.webp" alt="" class="country-tab-icon" loading="lazy" decoding="async">
      <span>Scotland</span>
    </button>
    <button class="country-tab" data-country="wales">
      <img src="img/wales.webp" alt="" class="country-tab-icon" loading="lazy" decoding="async">
      <span>Wales</span>
    </button>
  </div>

  <div id="panel-england" class="country-panel active">
    <div id="graphic-england"></div>
  </div>
  <div id="panel-scotland" class="country-panel">
    <div id="graphic-scotland"></div>
  </div>
  <div id="panel-wales" class="country-panel">
    <div id="graphic-wales"></div>
  </div>
</div>
<script src="js/all-nations-map.js"></script>
<script>
var englandMapApi = null;
var englandMapInited = false;
function initEnglandMap() {
  if (englandMapInited) return;
  englandMapInited = true;
  pollData(function () {
    return Promise.all([
      fetch(paUrl("results", "local_results.json")).then(function (r) { return r.json(); }).then(normalizeLocalResults),
      fetch(paUrl("results", "mayoral_results.json")).then(function (r) { return r.json(); }).then(normalizeFPTPResults),
      fetch("map_data/lad_map.geojson").then(function (r) { return r.json(); }),
      fetch("map_data/counties_map.geojson").then(function (r) { return r.json(); }),
      fetch(paUrl("nominations", "local_nominations.json")).then(function (r) { return r.json(); }).then(normalizeLocalNominations),
      fetch(paUrl("nominations", "mayoral_nominations.json")).then(function (r) { return r.json(); }).then(normalizeFPTPNominations),
    ]).then(function (arr) {
      return { localData: arr[0], mayoralData: arr[1], ladGeo: arr[2], countyGeo: arr[3], localNominations: arr[4], mayoralNominations: arr[5] };
    });
  }, function (data) {
    var container = document.getElementById("graphic-england");
    container.innerHTML = "";
    var results = data.localData.results || data.localData;
    englandMapApi = englandMap(container, results, data.ladGeo, data.countyGeo, data.mayoralData, {
      localNominations: data.localNominations,
      mayoralNominations: data.mayoralNominations,
    });
  }, function (data) {
    var results = data.localData.results || data.localData;
    if (englandMapApi && englandMapApi.update) {
      englandMapApi.update(results, data.mayoralData, data.localNominations, data.mayoralNominations);
    }
  });
}
initEnglandMap();

var scotlandMapApi = null;
var scotlandMapInited = false;
function initScotlandMap() {
  if (scotlandMapInited) return;
  scotlandMapInited = true;
  pollData(function () {
    return Promise.all([
      fetch(paUrl("results", "scottish_fptp_results.json")).then(function (r) { return r.json(); }).then(normalizeFPTPResults),
      fetch(paUrl("results", "scottish_topup_results.json")).then(function (r) { return r.json(); }).then(normalizeTopUpResults),
      fetch("map_data/scottish_constituencies.geojson").then(function (r) { return r.json(); }),
      fetch("map_data/scottish_regions.geojson").then(function (r) { return r.json(); }),
      fetch(paUrl("nominations", "scottish_fptp_nominations.json")).then(function (r) { return r.json(); }).then(normalizeFPTPNominations),
      fetch(paUrl("nominations", "scottish_topup_nominations.json")).then(function (r) { return r.json(); }).then(normalizeTopUpNominations),
    ]).then(function (arr) {
      return { constResults: arr[0], regResults: arr[1], constGeo: arr[2], regGeo: arr[3], constNominations: arr[4], regNominations: arr[5] };
    });
  }, function (data) {
    var container = document.getElementById("graphic-scotland");
    container.innerHTML = "";
    var constResults = Array.isArray(data.constResults) ? data.constResults : (data.constResults.results || data.constResults);
    var regResults = Array.isArray(data.regResults) ? data.regResults : (data.regResults.results || []);
    scotlandMapApi = scotlandMap(container, constResults, regResults, data.constGeo, data.regGeo, {
      constNominations: data.constNominations,
      regNominations: data.regNominations,
    });
  }, function (data) {
    var constResults = Array.isArray(data.constResults) ? data.constResults : (data.constResults.results || data.constResults);
    var regResults = Array.isArray(data.regResults) ? data.regResults : (data.regResults.results || []);
    if (scotlandMapApi && scotlandMapApi.update) {
      scotlandMapApi.update(constResults, regResults);
    }
  });
}

var walesMapApi = null;
var walesMapInited = false;
function initWalesMap() {
  if (walesMapInited) return;
  walesMapInited = true;
  pollData(function () {
    return Promise.all([
      fetch(paUrl("results", "welsh_results.json")).then(function (r) { return r.json(); }).then(normalizeTopUpResults),
      fetch("map_data/senedd_constituencies.geojson").then(function (r) { return r.json(); }),
      fetch(paUrl("nominations", "welsh_nominations.json")).then(function (r) { return r.json(); }).then(normalizeTopUpNominations),
    ]).then(function (arr) { return { results: arr[0], constGeo: arr[1], nominations: arr[2] }; });
  }, function (data) {
    var container = document.getElementById("graphic-wales");
    container.innerHTML = "";
    var results = Array.isArray(data.results) ? data.results : (data.results.results || []);
    walesMapApi = walesMap(container, results, data.constGeo, {
      nominations: data.nominations,
    });
  }, function (data) {
    var results = Array.isArray(data.results) ? data.results : (data.results.results || []);
    if (walesMapApi && walesMapApi.update) {
      walesMapApi.update(results);
    }
  });
}

(function () {
  var tabs = document.querySelectorAll(".country-tab");
  var panels = document.querySelectorAll(".country-panel");
  tabs.forEach(function (tab) {
    tab.addEventListener("click", function () {
      tabs.forEach(function (t) { t.classList.remove("active"); });
      panels.forEach(function (p) { p.classList.remove("active"); });
      tab.classList.add("active");
      var country = tab.getAttribute("data-country");
      document.getElementById("panel-" + country).classList.add("active");
      if (country === "scotland" && !scotlandMapInited) { initScotlandMap(); }
      if (country === "wales" && !walesMapInited) { initWalesMap(); }
      // Allow CSS transition to complete before resize
      setTimeout(function () {
        if (country === "england" && englandMapApi && englandMapApi.resize) englandMapApi.resize();
        if (country === "scotland" && scotlandMapApi && scotlandMapApi.resize) scotlandMapApi.resize();
        if (country === "wales" && walesMapApi && walesMapApi.resize) walesMapApi.resize();
      }, 150);
    });
  });
})();
</script>
</body>
</html>
