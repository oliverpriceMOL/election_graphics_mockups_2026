<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welsh Parliament Elections 2026 — Senedd</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="site-nav__link">England</a>
  <a href="scotland.html" class="site-nav__link">Scotland</a>
  <a href="wales.html" class="site-nav__link site-nav__link--active">Wales</a>
</nav>

<div class="container">

  <!-- Party strip (progress counter injected into toggle row by JS) -->
  <div class="section-title" style="margin-top:0">Party totals</div>
  <div id="party-strip"></div>

  <!-- Seat changes -->
  <div class="section-title">Seat changes</div>
  <div id="change-cols"></div>

  <!-- Map -->
  <div class="section-title">Map</div>
  <div id="wales-map"></div>

  <!-- Scoreboard -->
  <div class="section-title">Scoreboard</div>
  <div id="scoreboard"></div>

  <!-- Parliament hemicycle -->
  <div class="section-title">Parliament composition</div>
  <div style="display:flex; justify-content:center;">
    <div id="hemicycle" style="max-width:500px; width:100%;"></div>
  </div>

  <!-- Constituency result cards -->
  <div class="section-title">Constituency results (sample)</div>
  <div class="card-grid card-grid--2" id="const-cards"></div>

</div>

<!-- Component scripts -->
<script src="js/tooltip.js"></script>
<script src="js/utils.js"></script>
<script src="js/data-adapter.js"></script>
<script src="js/party-config.js"></script>
<script src="js/hemicycle.js"></script>
<script src="js/badge.js"></script>
<script src="js/progress.js"></script>
<script src="js/list-card.js"></script>
<script src="js/scoreboard.js"></script>
<script src="js/welsh-scoreboard.js"></script>
<script src="js/party-strip.js"></script>
<script src="js/devolved-strip.js"></script>
<script src="js/change-columns.js"></script>
<script src="js/devolved-change-columns.js"></script>
<script src="js/election-map.js"></script>
<script src="js/wales-map.js"></script>
<script>
Promise.all([
  fetch(paUrl("results", "welsh_results.json")).then(r => r.json()).then(normalizeTopUpResults),
  fetch("map_data/senedd_constituencies.geojson").then(r => r.json()),
  fetch(paUrl("nominations", "welsh_nominations.json")).then(r => r.json()).then(normalizeTopUpNominations),
]).then(([welshData, constGeo, welshNominations]) => {
    const results = Array.isArray(welshData) ? welshData : (welshData.results || []);

    const deduped = dedupByRevision(results);

    // Party strip (Wales has no regional results — pass empty array)
    devolvedPartyStrip(document.getElementById("party-strip"), results, [], { nation: "wales" });

    // Progress badge (inside strip toggle row, matching scoreboard declared style)
    const toggleRow = document.querySelector(".party-strip-toggle-row");
    if (toggleRow) {
      const badge = document.createElement("div");
      var totalConst = welshNominations.length || 16;
      badge.className = "scoreboard__declared" + (deduped.length >= totalConst ? " scoreboard__declared--complete" : "");
      badge.innerHTML = "<strong>" + deduped.length + "</strong> of <strong>" + totalConst + "</strong> constituencies declared";
      toggleRow.appendChild(badge);
    }

    // Seat changes
    devolvedChangeColumns(document.getElementById("change-cols"), results, [], { nation: "wales" });

    // Declared badge (inside change-cols toggle row)
    var changeToggleRow = document.querySelector("#change-cols .party-strip-toggle-row");
    if (changeToggleRow) {
      var changeBadge = document.createElement("div");
      var changeTotalConst = welshNominations.length || 16;
      changeBadge.className = "scoreboard__declared" + (deduped.length >= changeTotalConst ? " scoreboard__declared--complete" : "");
      changeBadge.innerHTML = "<strong>" + deduped.length + "</strong> of <strong>" + changeTotalConst + "</strong> constituencies declared";
      changeToggleRow.appendChild(changeBadge);
    }

    // Map
    walesMap(document.getElementById("wales-map"), results, constGeo, {
      nominations: welshNominations,
    });

    // Declared badge (bottom-right of map)
    var mapWrapper = document.querySelector("#wales-map .map-wrapper");
    if (mapWrapper) {
      var mapBadge = document.createElement("div");
      var mapTotalConst = welshNominations.length || 16;
      mapBadge.className = "scoreboard__declared" + (deduped.length >= mapTotalConst ? " scoreboard__declared--complete" : "");
      mapWrapper.appendChild(mapBadge);
      registerMapDeclaredBadge(
        mapWrapper,
        mapBadge,
        "<strong>" + deduped.length + "</strong> of <strong>" + mapTotalConst + "</strong> constituencies declared"
      );
    }

    // Parliament hemicycle — seats from elected candidates
    const seatParties = {};
    for (const r of deduped) {
      for (const c of (r.candidates || [])) {
        if (c.elected === "*") {
          const abbr = c.party.abbreviation;
          if (!seatParties[abbr]) seatParties[abbr] = { name: abbr, seats: 0 };
          seatParties[abbr].seats++;
        }
      }
    }
    const hemiData = Object.values(seatParties).sort((a, b) => b.seats - a.seats);
    hemicycle(document.getElementById("hemicycle"), hemiData, { width: 500 });

    // Scoreboard
    welshScoreboard(document.getElementById("scoreboard"), results);

    // Constituency cards — first 4
    const constContainer = document.getElementById("const-cards");
    for (const r of deduped.slice(0, 4)) {
      const div = document.createElement("div");
      constContainer.appendChild(div);
      listResultCard(div, r, { typeLabel: "Senedd Constituency" });
    }
  });
</script>
</body>
</html>
