<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scotland — Election Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>html,body{margin:0;padding:0;background:#fff;}</style>
</head>
<body>
<div id="graphic"></div>
<script src="js/scotland-map.js"></script>
<script>
var mapApi = null;
pollData(function () {
  return Promise.all([
    fetch(paUrl("results", "scottish_fptp_results.json")).then(function (r) { return r.json(); }).then(normalizeFPTPResults),
    fetch(paUrl("results", "scottish_topup_results.json")).then(function (r) { return r.json(); }).then(normalizeTopUpResults),
    fetch("map_data/scottish_constituencies.geojson").then(function (r) { return r.json(); }),
    fetch("map_data/scottish_regions.geojson").then(function (r) { return r.json(); }),
    fetch(paUrl("nominations", "scottish_fptp_nominations.json")).then(function (r) { return r.json(); }).then(normalizeFPTPNominations),
    fetch(paUrl("nominations", "scottish_topup_nominations.json")).then(function (r) { return r.json(); }).then(normalizeTopUpNominations),
  ]).then(function (arr) {
    return { constResults: arr[0], regResults: arr[1], constGeo: arr[2], regGeo: arr[3], constNominations: arr[4], regNominations: arr[5] };
  });
}, function (data) {
  var container = document.getElementById("graphic");
  container.innerHTML = "";
  var constResults = Array.isArray(data.constResults) ? data.constResults : (data.constResults.results || data.constResults);
  var regResults = Array.isArray(data.regResults) ? data.regResults : (data.regResults.results || []);
  var constDeduped = dedupByRevision(constResults);
  var regDeduped = dedupByRevision(regResults);

  mapApi = scotlandMap(container, constResults, regResults, data.constGeo, data.regGeo, {
    constNominations: data.constNominations,
    regNominations: data.regNominations,
  });

  // Declared badge (bottom-right of map)
  var mapWrapper = container.querySelector(".map-wrapper");
  if (mapWrapper) {
    var mapBadge = document.createElement("div");
    var totalConst = 73, totalReg = 8;
    mapBadge.className = "scoreboard__declared" + (constDeduped.length >= totalConst && regDeduped.length >= totalReg ? " scoreboard__declared--complete" : "");
    mapWrapper.appendChild(mapBadge);
    registerMapDeclaredBadge(
      mapWrapper,
      mapBadge,
      "<strong>" + constDeduped.length + "</strong> of <strong>" + totalConst + "</strong> constituencies, <strong>" + regDeduped.length + "</strong> of <strong>" + totalReg + "</strong> regions declared"
    );
  }
}, function (data) {
  // Incremental update — patch map paths without destroying DOM
  var constResults = Array.isArray(data.constResults) ? data.constResults : (data.constResults.results || data.constResults);
  var regResults = Array.isArray(data.regResults) ? data.regResults : (data.regResults.results || []);
  if (mapApi && mapApi.update) {
    mapApi.update(constResults, regResults);
  }
});
</script>
</body>
</html>
