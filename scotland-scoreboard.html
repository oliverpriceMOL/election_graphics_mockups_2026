<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scotland — Scoreboard</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>html,body{margin:0;padding:0;background:#fff;}</style>
</head>
<body>
<div id="graphic"></div>
<script src="js/scotland-scoreboard.js"></script>
<script>
pollData(function () {
  return Promise.all([
    fetch(paUrl("results", "scottish_fptp_results.json")).then(function (r) { return r.json(); }).then(normalizeFPTPResults),
    fetch(paUrl("results", "scottish_topup_results.json")).then(function (r) { return r.json(); }).then(normalizeTopUpResults),
    fetch("data/scottish_notionals.json").then(function (r) { return r.json(); }).catch(function () { return {}; }),
  ]).then(function (arr) { return { constResults: arr[0], regResults: arr[1], notionals: arr[2] }; });
}, function (data) {
  var container = document.getElementById("graphic");
  container.innerHTML = "";
  var constResults = Array.isArray(data.constResults) ? data.constResults : (data.constResults.results || data.constResults);
  var regResults = Array.isArray(data.regResults) ? data.regResults : (data.regResults.results || []);

  var constDeduped = dedupByRevision(constResults);
  var regDeduped = dedupByRevision(regResults);
  enrichWithNotionals(constDeduped, regDeduped, data.notionals);

  scottishScoreboard(container, constResults, regResults);
});
</script>
</body>
</html>
