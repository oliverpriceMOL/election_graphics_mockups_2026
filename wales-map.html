<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wales — Election Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>html,body{margin:0;padding:0;background:#fff;}</style>
</head>
<body>
<div id="graphic"></div>
<script src="js/wales-map.js"></script>
<script>
var mapApi = null;
pollData(function () {
  return Promise.all([
    fetch(paUrl("results", "welsh_results.json")).then(function (r) { return r.json(); }).then(normalizeTopUpResults),
    fetch("map_data/senedd_constituencies.geojson").then(function (r) { return r.json(); }),
    fetch(paUrl("nominations", "welsh_nominations.json")).then(function (r) { return r.json(); }).then(normalizeTopUpNominations),
  ]).then(function (arr) { return { results: arr[0], constGeo: arr[1], nominations: arr[2] }; });
}, function (data) {
  var container = document.getElementById("graphic");
  container.innerHTML = "";
  var results = Array.isArray(data.results) ? data.results : (data.results.results || []);
  var deduped = dedupByRevision(results);

  mapApi = walesMap(container, results, data.constGeo, {
    nominations: data.nominations,
  });

  // Declared badge (bottom-right of map)
  var mapWrapper = container.querySelector(".map-wrapper");
  if (mapWrapper) {
    var mapBadge = document.createElement("div");
    var totalConst = data.nominations.length || 16;
    mapBadge.className = "scoreboard__declared" + (deduped.length >= totalConst ? " scoreboard__declared--complete" : "");
    mapWrapper.appendChild(mapBadge);
    registerMapDeclaredBadge(
      mapWrapper,
      mapBadge,
      "<strong>" + deduped.length + "</strong> of <strong>" + totalConst + "</strong> constituencies declared"
    );
  }
}, function (data) {
  // Incremental update — patch map paths without destroying DOM
  var results = Array.isArray(data.results) ? data.results : (data.results.results || []);
  if (mapApi && mapApi.update) {
    mapApi.update(results);
  }
});
</script>
</body>
</html>
