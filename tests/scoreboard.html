<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test: Scoreboard &amp; Progress</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="page-header">
  <h1>Scoreboard &amp; Progress Counter</h1>
  <p>National aggregation components</p>
</div>

<div class="container">
  <div class="section-title">Progress Counter</div>
  <div id="progress"></div>

  <div class="section-title">Party Scoreboard</div>
  <div id="scoreboard"></div>
</div>

<script src="../js/party-config.js"></script>
<script src="../js/progress.js"></script>
<script src="../js/scoreboard.js"></script>
<script>
fetch("../../output/local_results.json")
  .then(r => r.json())
  .then(data => {
    const results = data.results || data;

    const byName = {};
    for (const r of results) {
      if (!byName[r.name] || (r.revision || 0) > (byName[r.name].revision || 0)) {
        byName[r.name] = r;
      }
    }
    const deduped = Object.values(byName);

    progressCounter(document.getElementById("progress"), {
      declared: deduped.length,
      total: 136,
      label: "councils",
    });

    partyScoreboard(document.getElementById("scoreboard"), results);
  });
</script>
</body>
</html>
