<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test: Council Cards</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="page-header">
  <h1>Council Result Cards</h1>
  <p>Full and mini variants</p>
</div>

<div class="container">
  <div class="section-title">Council Result Cards (Full)</div>
  <div class="card-grid card-grid--2" id="council-cards-full"></div>

  <div class="section-title">Council Result Cards (Mini)</div>
  <div class="card-grid card-grid--4" id="council-cards-mini"></div>
</div>

<script src="../js/party-config.js"></script>
<script src="../js/hemicycle.js"></script>
<script src="../js/badge.js"></script>
<script src="../js/council-card.js"></script>
<script>
fetch("../../output/local_results.json")
  .then(r => r.json())
  .then(data => {
    const results = data.results || data;

    const byName = {};
    for (const r of results) {
      if (!byName[r.name] || (r.revision || 0) > (byName[r.name].revision || 0)) {
        byName[r.name] = r;
      }
    }
    const deduped = Object.values(byName);

    // Full cards — one of each council type
    const typeExamples = {};
    for (const r of deduped) {
      if (!typeExamples[r.type]) typeExamples[r.type] = r;
    }
    const fullContainer = document.getElementById("council-cards-full");
    for (const council of Object.values(typeExamples)) {
      const div = document.createElement("div");
      fullContainer.appendChild(div);
      councilResultCard(div, council, { size: "full" });
    }

    // Mini cards — first 8
    const miniContainer = document.getElementById("council-cards-mini");
    for (const council of deduped.slice(0, 8)) {
      const div = document.createElement("div");
      miniContainer.appendChild(div);
      councilResultCard(div, council, { size: "mini" });
    }
  });
</script>
</body>
</html>
