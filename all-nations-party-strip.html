<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Nations — Party Totals</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>html,body{margin:0;padding:0;background:#fff;}</style>
</head>
<body>
<div id="graphic" style="padding:12px;">
  <div class="country-tabs">
    <button class="country-tab active" data-country="england">
      <img src="img/england.webp" alt="" class="country-tab-icon" loading="lazy" decoding="async">
      <span>England</span>
    </button>
    <button class="country-tab" data-country="scotland">
      <img src="img/scotland.webp" alt="" class="country-tab-icon" loading="lazy" decoding="async">
      <span>Scotland</span>
    </button>
    <button class="country-tab" data-country="wales">
      <img src="img/wales.webp" alt="" class="country-tab-icon" loading="lazy" decoding="async">
      <span>Wales</span>
    </button>
  </div>

  <div id="panel-england" class="country-panel active">
    <div id="graphic-england"></div>
  </div>
  <div id="panel-scotland" class="country-panel">
    <div id="graphic-scotland"></div>
  </div>
  <div id="panel-wales" class="country-panel">
    <div id="graphic-wales"></div>
  </div>
</div>
<script src="js/all-nations-party-strip.js"></script>
<script>
pollData(function () {
  return Promise.all([
    fetch(paUrl("results", "local_results.json")).then(function (r) { return r.json(); }).then(normalizeLocalResults),
    fetch(paUrl("nominations", "local_nominations.json")).then(function (r) { return r.json(); }).then(normalizeLocalNominations),
  ]).then(function (arr) { return { results: arr[0], nominations: arr[1] }; });
}, function (data) {
  var container = document.getElementById("graphic-england");
  container.innerHTML = "";
  var results = data.results.results || data.results;
  var deduped = dedupByRevision(results);
  partyTotalsStrip(container, results);
  var toggleRow = container.querySelector(".party-strip-toggle-row");
  if (toggleRow) {
    var badge = document.createElement("div");
    var totalCouncils = data.nominations.length || 136;
    badge.className = "scoreboard__declared" + (deduped.length >= totalCouncils ? " scoreboard__declared--complete" : "");
    badge.innerHTML = "<strong>" + deduped.length + "</strong> of <strong>" + totalCouncils + "</strong> councils declared";
    toggleRow.appendChild(badge);
  }
});

pollData(function () {
  return Promise.all([
    fetch(paUrl("results", "scottish_fptp_results.json")).then(function (r) { return r.json(); }).then(normalizeFPTPResults),
    fetch(paUrl("results", "scottish_topup_results.json")).then(function (r) { return r.json(); }).then(normalizeTopUpResults),
    fetch(paUrl("nominations", "scottish_fptp_nominations.json")).then(function (r) { return r.json(); }).then(normalizeFPTPNominations),
  ]).then(function (arr) { return { constResults: arr[0], regResults: arr[1], constNominations: arr[2] }; });
}, function (data) {
  var container = document.getElementById("graphic-scotland");
  container.innerHTML = "";
  var constResults = Array.isArray(data.constResults) ? data.constResults : (data.constResults.results || data.constResults);
  var regResults = Array.isArray(data.regResults) ? data.regResults : (data.regResults.results || []);
  devolvedPartyStrip(container, constResults, regResults, { nation: "scotland" });
  var constDeduped = dedupByRevision(constResults);
  var regDeduped = dedupByRevision(regResults);
  var toggleRow = container.querySelector(".party-strip-toggle-row");
  if (toggleRow) {
    var badge = document.createElement("div");
    var totalConst = 73, totalReg = 8;
    badge.className = "scoreboard__declared" + (constDeduped.length >= totalConst && regDeduped.length >= totalReg ? " scoreboard__declared--complete" : "");
    badge.innerHTML = "<strong>" + constDeduped.length + "</strong> of <strong>" + totalConst + "</strong> constituencies, <strong>" + regDeduped.length + "</strong> of <strong>" + totalReg + "</strong> regions declared";
    toggleRow.appendChild(badge);
  }
});

pollData(function () {
  return Promise.all([
    fetch(paUrl("results", "welsh_results.json")).then(function (r) { return r.json(); }).then(normalizeTopUpResults),
    fetch(paUrl("nominations", "welsh_nominations.json")).then(function (r) { return r.json(); }).then(normalizeTopUpNominations),
  ]).then(function (arr) { return { results: arr[0], nominations: arr[1] }; });
}, function (data) {
  var container = document.getElementById("graphic-wales");
  container.innerHTML = "";
  var results = Array.isArray(data.results) ? data.results : (data.results.results || []);
  var deduped = dedupByRevision(results);
  devolvedPartyStrip(container, results, [], { nation: "wales" });
  var toggleRow = container.querySelector(".party-strip-toggle-row");
  if (toggleRow) {
    var badge = document.createElement("div");
    var totalConst = data.nominations.length || 16;
    badge.className = "scoreboard__declared" + (deduped.length >= totalConst ? " scoreboard__declared--complete" : "");
    badge.innerHTML = "<strong>" + deduped.length + "</strong> of <strong>" + totalConst + "</strong> constituencies declared";
    toggleRow.appendChild(badge);
  }
});

(function () {
  var tabs = document.querySelectorAll(".country-tab");
  var panels = document.querySelectorAll(".country-panel");
  tabs.forEach(function (tab) {
    tab.addEventListener("click", function () {
      tabs.forEach(function (t) { t.classList.remove("active"); });
      panels.forEach(function (p) { p.classList.remove("active"); });
      tab.classList.add("active");
      var country = tab.getAttribute("data-country");
      document.getElementById("panel-" + country).classList.add("active");
      
    });
  });
})();
</script>
</body>
</html>
