<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wales — Scoreboard</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>html,body{margin:0;padding:0;background:#fff;}</style>
</head>
<body>
<div id="graphic"></div>
<script src="js/wales-scoreboard.js"></script>
<script>
pollData(function () {
  return fetch(paUrl("results", "welsh_results.json")).then(function (r) { return r.json(); }).then(normalizeTopUpResults);
}, function (data) {
  var container = document.getElementById("graphic");
  container.innerHTML = "";
  var results = Array.isArray(data) ? data : (data.results || []);
  welshScoreboard(container, results);
});
</script>
</body>
</html>
